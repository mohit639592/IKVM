<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homework</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: linear-gradient(180deg, #020617, #0f172a);
    }
  </style>
</head>

<body class="text-white min-h-screen px-4 py-6">

  <!-- 🔥 HEADER -->
  <div class="flex justify-between items-center mb-5">
    <h1 class="text-2xl font-bold">📚 Homework</h1>
    <button onclick="goBack()" class="text-sm bg-white/10 px-3 py-1 rounded-lg">Back</button>
  </div>

  <!-- 🔥 FILTER -->
  <div class="mb-5">
    <input 
      type="date" 
      id="dateFilter"
      class="w-full p-3 rounded-xl bg-white/10 text-white outline-none"
    >

    <button onclick="applyFilter()" 
      class="w-full mt-3 bg-purple-600 p-3 rounded-xl">
      Apply Filter
    </button>

    <button onclick="loadHomework()" 
      class="w-full mt-2 bg-gray-600 p-3 rounded-xl">
      Reset
    </button>
  </div>

  <!-- 🔥 HOMEWORK LIST -->
  <div id="homeworkList" class="space-y-4"></div>

  <!-- 🔥 FIREBASE -->
  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { 
    getAuth, 
    onAuthStateChanged 
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  import {
    getFirestore,
    collection,
    getDocs,
    doc,
    getDoc
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyADk8OyaN6-8sbzuq3s0TTbe9cO1ryv4PA",
    authDomain: "ikvm-226e7.firebaseapp.com",
    projectId: "ikvm-226e7"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let allHomework = [];
  let studentClass = "";

  // 🔥 AUTH CHECK
  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = "index.html";
      return;
    }

    // 🔥 GET USER CLASS
    const userDoc = await getDoc(doc(db, "users", user.email));

    if (!userDoc.exists()) {
      alert("User data not found");
      return;
    }

    studentClass = userDoc.data().class;

    // 🔥 LOAD HOMEWORK AFTER CLASS FETCH
    loadHomework();
  });

  // 🔥 LOAD CLASS-WISE HOMEWORK
  async function loadHomework() {
    document.getElementById("homeworkList").innerHTML = "Loading...";

    const snapshot = await getDocs(collection(db, "homework"));
    allHomework = [];

    snapshot.forEach(doc => {
      const data = doc.data();

      // 🔥 FILTER BY CLASS
      if (data.class === studentClass) {
        allHomework.push(data);
      }
    });

    displayHomework(allHomework);
  }

  // 🔥 DISPLAY FUNCTION
  function displayHomework(data) {
    const container = document.getElementById("homeworkList");

    if (data.length === 0) {
      container.innerHTML = "<p class='text-gray-400'>No homework found</p>";
      return;
    }

    container.innerHTML = "";

    data.sort((a, b) => b.date - a.date);

    data.forEach(hw => {
      const date = new Date(hw.date).toLocaleDateString();

      container.innerHTML += `
        <div class="bg-white/5 border border-white/10 rounded-2xl p-5 backdrop-blur-xl">
          <h2 class="text-lg font-semibold">${hw.title}</h2>
          <p class="text-gray-400 text-sm">${hw.subject}</p>
          <p class="text-gray-500 text-xs mt-1">${date}</p>

          <button onclick="window.open('${hw.pdfUrl}', '_blank')" 
            class="mt-3 bg-blue-600 px-3 py-2 rounded-lg text-sm">
            Open PDF
          </button>
        </div>
      `;
    });
  }

  // 🔥 FILTER BY DATE (ALSO CLASS FILTERED)
  window.applyFilter = function () {
    const selectedDate = document.getElementById("dateFilter").value;

    if (!selectedDate) return;

    const selected = new Date(selectedDate).toDateString();

    const filtered = allHomework.filter(hw => {
      const hwDate = new Date(hw.date).toDateString();
      return hwDate === selected;
    });

    displayHomework(filtered);
  };

  window.goBack = function () {
    window.location.href = "dashboard.html";
  };
</script>

</body>
</html>
