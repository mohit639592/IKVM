<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Homework</title>

  <!-- TAILWIND -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- ICONS -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  >

  <style>

    body{
      background: #050505;
      font-family: Arial, sans-serif;
      color: white;
    }

    .card{
      background: #111111;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 24px;
    }

    .btn{
      transition: 0.2s;
    }

    .btn:active{
      transform: scale(0.96);
    }

    input[type="date"]::-webkit-calendar-picker-indicator{
      filter: invert(1);
      cursor: pointer;
    }

  </style>

</head>

<body class="pb-24">

  <!-- HEADER -->
  <div class="bg-black border-b border-white/10 px-4 py-4 sticky top-0 z-50">

    <div class="flex justify-between items-center">

      <!-- LEFT -->
      <div class="flex items-center gap-4">

        <button
          onclick="goBack()"
          class="text-2xl"
        >
          <i class="fa-solid fa-arrow-left"></i>
        </button>

        <div>

          <h1 class="text-2xl font-black">
            Homework
          </h1>

          <p class="text-xs text-gray-400 mt-1">
            View assignments and PDFs
          </p>

        </div>

      </div>

      <!-- RIGHT -->
      <div class="w-11 h-11 rounded-xl bg-blue-500/10 flex items-center justify-center text-blue-400 text-xl">
        <i class="fa-solid fa-book-open"></i>
      </div>

    </div>

  </div>

  <!-- MAIN -->
  <div class="p-4">

    <!-- FILTER CARD -->
    <div class="card p-4 mb-5">

      <div class="flex items-center gap-3 mb-4">

        <div class="w-12 h-12 rounded-2xl bg-purple-500/10 flex items-center justify-center text-purple-400 text-xl">
          <i class="fa-solid fa-filter"></i>
        </div>

        <div>

          <h2 class="text-lg font-bold">
            Filter Homework
          </h2>

          <p class="text-sm text-gray-400">
            Search by assignment date
          </p>

        </div>

      </div>

      <!-- DATE -->
      <input
        type="date"
        id="dateFilter"
        class="w-full bg-[#1a1a1a] border border-white/5 p-4 rounded-2xl outline-none text-white"
      >

      <!-- BUTTONS -->
      <div class="grid grid-cols-2 gap-3 mt-4">

        <!-- APPLY -->
        <button
          onclick="applyFilter()"
          class="btn bg-purple-600 rounded-2xl p-4 font-semibold"
        >
          Apply
        </button>

        <!-- RESET -->
        <button
          onclick="loadHomework()"
          class="btn bg-[#1a1a1a] border border-white/5 rounded-2xl p-4 font-semibold"
        >
          Reset
        </button>

      </div>

    </div>

    <!-- TITLE -->
    <div class="flex items-center justify-between mb-4">

      <h2 class="text-2xl font-bold">
        Assignments
      </h2>

      <p
        id="count"
        class="text-sm text-gray-400"
      >
        0 Homework
      </p>

    </div>

    <!-- HOMEWORK LIST -->
    <div
      id="homeworkList"
      class="space-y-4"
    ></div>

  </div>

  <!-- FIREBASE -->
  <script type="module">

    import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

    import {
      getAuth,
      onAuthStateChanged
    }
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    import {
      getFirestore,
      collection,
      getDocs,
      doc,
      getDoc
    }
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // FIREBASE CONFIG
    const firebaseConfig = {
      apiKey: "AIzaSyADk8OyaN6-8sbzuq3s0TTbe9cO1ryv4PA",
      authDomain: "ikvm-226e7.firebaseapp.com",
      projectId: "ikvm-226e7"
    };

    // INIT
    const app = initializeApp(firebaseConfig);

    const auth = getAuth(app);

    const db = getFirestore(app);

    let allHomework = [];

    let studentClass = "";

    // AUTH CHECK
    onAuthStateChanged(auth, async (user) => {

      if (!user) {

        window.location.href =
        "index.html";

        return;
      }

      // GET USER CLASS
      const userDoc =
      await getDoc(
        doc(db, "users", user.email)
      );

      if (!userDoc.exists()) {

        alert("User data not found");

        return;
      }

      studentClass =
      userDoc.data().class;

      // LOAD HOMEWORK
      loadHomework();

    });

    // LOAD HOMEWORK
    async function loadHomework() {

      document.getElementById("homeworkList")
      .innerHTML = `

        <div class="card p-5 text-center text-gray-400">
          Loading Homework...
        </div>

      `;

      const snapshot =
      await getDocs(collection(db, "homework"));

      allHomework = [];

      snapshot.forEach(doc => {

        const data = doc.data();

        // CLASS FILTER
        if (data.class === studentClass) {

          allHomework.push(data);

        }

      });

      displayHomework(allHomework);

    }

    // DISPLAY FUNCTION
    function displayHomework(data) {

      const container =
      document.getElementById("homeworkList");

      document.getElementById("count")
      .innerText =
      `${data.length} Homework`;

      // EMPTY
      if (data.length === 0) {

        container.innerHTML = `

          <div class="card p-6 text-center">

            <div class="text-5xl mb-4">
              📚
            </div>

            <h2 class="text-xl font-bold">
              No Homework Found
            </h2>

            <p class="text-gray-400 text-sm mt-2">
              No assignments available right now.
            </p>

          </div>

        `;

        return;
      }

      container.innerHTML = "";

      // SORT
      data.sort((a, b) => b.date - a.date);

      data.forEach(hw => {

        const date =
        new Date(hw.date)
        .toLocaleDateString();

        container.innerHTML += `

          <div class="card p-5">

            <!-- TOP -->
            <div class="flex justify-between gap-4">

              <!-- LEFT -->
              <div class="flex gap-4">

                <!-- ICON -->
                <div class="w-14 h-14 rounded-2xl bg-blue-500/10 flex items-center justify-center text-2xl">
                  📘
                </div>

                <!-- INFO -->
                <div>

                  <h2 class="text-lg font-bold">
                    ${hw.title}
                  </h2>

                  <p class="text-sm text-gray-400 mt-1">
                    ${hw.subject}
                  </p>

                  <p class="text-xs text-gray-500 mt-2">
                    ${date}
                  </p>

                </div>

              </div>

            </div>

            <!-- BUTTON -->
            <button
              onclick="window.open('${hw.pdfUrl}', '_blank')"
              class="btn w-full mt-5 bg-blue-600 rounded-2xl p-4 font-semibold"
            >
              <i class="fa-solid fa-file-pdf mr-2"></i>
              Open PDF
            </button>

          </div>

        `;

      });

    }

    // FILTER
    window.applyFilter = function () {

      const selectedDate =
      document.getElementById("dateFilter").value;

      if (!selectedDate)
      return;

      const selected =
      new Date(selectedDate).toDateString();

      const filtered =
      allHomework.filter(hw => {

        const hwDate =
        new Date(hw.date).toDateString();

        return hwDate === selected;

      });

      displayHomework(filtered);

    };

    // BACK
    window.goBack = function () {

      window.location.href =
      "dashboard.html";

    };

  </script>

</body>
</html>
