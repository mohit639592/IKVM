<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- MOBILE -->
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>IKVM Login</title>

  <!-- TAILWIND -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- ICONS -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  >

  <style>

    body{
      background: #050505;
      font-family: Arial, sans-serif;
      color: white;
    }

    .card{
      background: #111111;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 28px;
    }

    .btn{
      transition: 0.2s;
    }

    .btn:active{
      transform: scale(0.96);
    }

  </style>

</head>

<body class="flex items-center justify-center min-h-screen px-4">

  <!-- LOGIN CARD -->
  <div class="card w-full max-w-md p-7">

    <!-- TOP -->
    <div class="text-center mb-8">

      <!-- ICON -->
      <div class="w-24 h-24 mx-auto rounded-3xl bg-purple-500/10 flex items-center justify-center text-purple-400 text-5xl mb-5">
        <i class="fa-solid fa-building-columns"></i>
      </div>

      <h1 class="text-4xl font-black">
        IKVM
      </h1>

      <p class="text-gray-400 mt-3">
        Student ERP Portal
      </p>

    </div>

    <!-- EMAIL -->
    <div class="mb-4">

      <label class="text-sm text-gray-400 block mb-2">
        Email Address
      </label>

      <div class="bg-[#1a1a1a] border border-white/5 rounded-2xl px-4 flex items-center">

        <i class="fa-solid fa-envelope text-gray-500"></i>

        <input
          id="email"
          type="email"
          placeholder="Enter Email"
          class="w-full bg-transparent p-4 outline-none text-white"
        >

      </div>

    </div>

    <!-- PASSWORD -->
    <div class="mb-5">

      <label class="text-sm text-gray-400 block mb-2">
        Password
      </label>

      <div class="bg-[#1a1a1a] border border-white/5 rounded-2xl px-4 flex items-center">

        <i class="fa-solid fa-lock text-gray-500"></i>

        <input
          id="password"
          type="password"
          placeholder="Enter Password"
          class="w-full bg-transparent p-4 outline-none text-white"
        >

      </div>

    </div>

    <!-- BUTTON -->
    <button
      onclick="loginUser()"
      id="loginBtn"
      class="btn w-full bg-gradient-to-r from-purple-600 to-pink-600 rounded-2xl p-4 font-bold text-lg"
    >
      Login
    </button>

    <!-- ADMIN INFO -->
    <div class="mt-5 bg-red-500/10 border border-red-500/10 rounded-2xl p-4">

      <div class="flex items-center gap-3">

        <div class="text-red-400 text-xl">
          <i class="fa-solid fa-user-shield"></i>
        </div>

        <div>

          <h2 class="font-semibold">
            Admin Access
          </h2>

          <p class="text-xs text-gray-400 mt-1">
            Admin email automatically redirects
            to admin portal after login.
          </p>

        </div>

      </div>

    </div>

    <!-- STATUS -->
    <p
      id="status"
      class="text-center text-sm mt-5 text-gray-400"
    ></p>

  </div>

  <!-- FIREBASE -->
  <script type="module">

    import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

    import {
      getAuth,
      signInWithEmailAndPassword
    }
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // FIREBASE CONFIG
    const firebaseConfig = {
      apiKey: "AIzaSyADk8OyaN6-8sbzuq3s0TTbe9cO1ryv4PA",
      authDomain: "ikvm-226e7.firebaseapp.com",
      projectId: "ikvm-226e7",
      storageBucket: "ikvm-226e7.firebasestorage.app",
      messagingSenderId: "760869116173",
      appId: "1:760869116173:web:ef05c859b6f116d2673844"
    };

    // INIT
    const app = initializeApp(firebaseConfig);

    const auth = getAuth(app);

    // LOGIN
    window.loginUser = async function () {

      const email =
      document.getElementById("email").value.trim();

      const password =
      document.getElementById("password").value.trim();

      const status =
      document.getElementById("status");

      const btn =
      document.getElementById("loginBtn");

      // EMPTY CHECK
      if (!email || !password) {

        status.innerText =
        "❌ Please fill all fields";

        return;
      }

      try {

        // LOADING
        btn.innerHTML =
        '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Logging in...';

        btn.disabled = true;

        // FIREBASE LOGIN
        await signInWithEmailAndPassword(
          auth,
          email,
          password
        );

        status.innerText =
        "✅ Login successful";

        // ADMIN CHECK
        setTimeout(() => {

          // ADMIN
          if (
            email === "admin@gmail.com"
          ) {

            window.location.href =
            "admin.html";

          }

          // STUDENT
          else {

            window.location.href =
            "dashboard.html";

          }

        }, 800);

      }

      catch (error) {

        status.innerText =
        "❌ " + error.message;

        btn.disabled = false;

        btn.innerText =
        "Login";

      }

    };

  </script>

</body>
</html>
