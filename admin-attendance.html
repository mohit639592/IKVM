<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Attendance System</title>

  <!-- TAILWIND -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- ICONS -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  >

  <style>

    body{
      background:#050505;
      font-family:Arial,sans-serif;
      color:white;
    }

    .card{
      background:#111111;
      border:1px solid rgba(255,255,255,0.06);
      border-radius:24px;
    }

    .btn{
      transition:0.2s;
    }

    .btn:active{
      transform:scale(0.96);
    }

    select{
      background:#1a1a1a;
    }

  </style>

</head>

<body class="pb-24">

  <!-- HEADER -->
  <div class="bg-black border-b border-white/10 px-4 py-4 sticky top-0 z-50">

    <div class="flex justify-between items-center">

      <!-- LEFT -->
      <div class="flex items-center gap-4">

        <button
          onclick="goBack()"
          class="text-2xl"
        >
          <i class="fa-solid fa-arrow-left"></i>
        </button>

        <div>

          <h1 class="text-2xl font-black">
            Attendance System
          </h1>

          <p class="text-xs text-gray-400 mt-1">
            Upload daily attendance
          </p>

        </div>

      </div>

      <!-- RIGHT -->
      <div class="w-11 h-11 rounded-xl bg-green-500/10 flex items-center justify-center text-green-400 text-xl">
        <i class="fa-solid fa-check"></i>
      </div>

    </div>

  </div>



  <!-- MAIN -->
  <div class="p-4">

    <!-- SETTINGS -->
    <div class="card p-5 mb-5">

      <h2 class="text-xl font-bold mb-4">
        Attendance Settings
      </h2>

      <!-- CLASS -->
      <select
        id="classSelect"
        class="w-full bg-[#1a1a1a] border border-white/5 p-4 rounded-2xl outline-none mb-4"
      >

        <option value="">
          Loading Classes...
        </option>

      </select>

      <!-- TYPE -->
      <select
        id="attendanceType"
        class="w-full bg-[#1a1a1a] border border-white/5 p-4 rounded-2xl outline-none"
      >

        <option value="homework">
          Homework Attendance
        </option>

        <option value="forenoon">
          Forenoon Attendance
        </option>

        <option value="afternoon">
          Afternoon Attendance
        </option>

      </select>

      <!-- BUTTON -->
      <button
        onclick="loadStudents()"
        class="btn w-full mt-4 bg-green-600 rounded-2xl p-4 font-bold"
      >
        Load Students
      </button>

    </div>



    <!-- TITLE -->
    <div class="flex justify-between items-center mb-4">

      <h2 class="text-2xl font-bold">
        Students
      </h2>

      <p
        id="studentCount"
        class="text-sm text-gray-400"
      >
        0 Students
      </p>

    </div>



    <!-- STUDENTS -->
    <div
      id="studentList"
      class="space-y-4"
    ></div>



    <!-- UPLOAD -->
    <button
      onclick="uploadAttendance()"
      class="btn w-full mt-6 bg-blue-600 rounded-2xl p-4 font-bold text-lg"
    >
      Upload Attendance
    </button>



    <!-- STATUS -->
    <p
      id="status"
      class="text-center text-sm mt-4 text-gray-400"
    ></p>

  </div>



  <!-- FIREBASE -->
  <script type="module">

    import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

    import {

      getAuth,
      onAuthStateChanged,
      browserLocalPersistence,
      setPersistence

    }
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    import {

      getFirestore,
      collection,
      getDocs,
      query,
      where,
      doc,
      getDoc,
      setDoc

    }
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";



    // ================= CONFIG =================

    const firebaseConfig = {

       apiKey: "AIzaSyADk8OyaN6-8sbzuq3s0TTbe9cO1ryv4PA",
  authDomain: "ikvm-226e7.firebaseapp.com",
  projectId: "ikvm-226e7",

    };



    // ================= INIT =================

    const app =
    initializeApp(firebaseConfig);

    const auth =
    getAuth(app);

    const db =
    getFirestore(app);



    // ================= PERSISTENCE =================

    await setPersistence(
      auth,
      browserLocalPersistence
    );



    // ================= VARIABLES =================

    let students = [];

    let alreadyUpdated = false;



    // ================= ADMIN CHECK =================

    onAuthStateChanged(auth, async (user) => {

      if (!user) {

        setTimeout(() => {

          if (!auth.currentUser) {

            window.location.href =
            "index.html";

          }

        }, 2000);

        return;
      }

      // ADMIN ONLY
      if (user.email !== "admin@gmail.com") {

        alert("Access Denied");

        window.location.href =
        "dashboard.html";

        return;
      }

      loadClasses();

    });



    // ================= LOAD CLASSES =================

    async function loadClasses() {

      const select =
      document.getElementById("classSelect");

      const snapshot =
      await getDocs(collection(db, "users"));

      let classes = [];

      snapshot.forEach((docSnap) => {

        const data =
        docSnap.data();

        if (
          data.class &&
          !classes.includes(data.class)
        ) {

          classes.push(data.class);

        }

      });

      classes.sort((a,b) => a - b);

      select.innerHTML = `
        <option value="">
          Select Class
        </option>
      `;

      classes.forEach(cls => {

        select.innerHTML += `
          <option value="${cls}">
            Class ${cls}
          </option>
        `;

      });

    }



    // ================= LOAD STUDENTS =================

    window.loadStudents = async function () {

      const className =
      document.getElementById("classSelect").value;

      const type =
      document.getElementById("attendanceType").value;

      if (!className) {

        alert("Select Class");

        return;
      }

      const container =
      document.getElementById("studentList");

      container.innerHTML = `
        <div class="card p-5 text-center text-gray-400">
          Loading Students...
        </div>
      `;

      students = [];

      alreadyUpdated = false;

      const q =
      query(
        collection(db,"users"),
        where("class","==",className)
      );

      const snapshot =
      await getDocs(q);

      container.innerHTML = "";

      if (snapshot.empty) {

        container.innerHTML = `
          <div class="card p-5 text-center text-gray-400">
            No Students Found
          </div>
        `;

        return;
      }

      for (const docSnap of snapshot.docs) {

        const data =
        docSnap.data();

        students.push({
          ...data,
          email: docSnap.id
        });

      }

      document.getElementById("studentCount")
      .innerText =
      `${students.length} Students`;



      // ================= SHOW =================

      for (const student of students) {

        let checked = false;

        const ref =
        doc(
          db,
          "student_attendance",
          student.email
        );

        const snap =
        await getDoc(ref);

        const today =
        new Date().toISOString().split("T")[0];



        // ================= OLD DATA =================

        if (snap.exists()) {

          const old =
          snap.data();



          // HOMEWORK
          if (
            type === "homework" &&
            old.lastHomeworkDate === today
          ) {

            alreadyUpdated = true;

            checked =
            old.todayHomework || false;

          }



          // FORENOON
          if (
            type === "forenoon" &&
            old.lastForenoonDate === today
          ) {

            alreadyUpdated = true;

            checked =
            old.todayForenoon || false;

          }



          // AFTERNOON
          if (
            type === "afternoon" &&
            old.lastAfternoonDate === today
          ) {

            alreadyUpdated = true;

            checked =
            old.todayAfternoon || false;

          }

        }



        // ================= CARD =================

        container.innerHTML += `

          <div class="card p-5">

            <div class="flex justify-between items-center">

              <!-- LEFT -->
              <div class="flex items-center gap-4">

                <div class="w-14 h-14 rounded-2xl bg-blue-500/10 flex items-center justify-center text-2xl">
                  👨‍🎓
                </div>

                <div>

                  <h2 class="text-lg font-bold">
                    ${student.name || "No Name"}
                  </h2>

                  <p class="text-sm text-gray-400 mt-1">
                    ${student.email}
                  </p>

                </div>

              </div>

              <!-- CHECKBOX -->
              <input
                type="checkbox"
                class="w-6 h-6 accent-green-500"
                id="${student.email}"
                ${checked ? "checked" : ""}
              >

            </div>

          </div>

        `;

      }

    };



    // ================= UPLOAD =================

    window.uploadAttendance = async function () {

      const status =
      document.getElementById("status");

      const type =
      document.getElementById("attendanceType").value;

      const today =
      new Date().toISOString().split("T")[0];



      // ================= NO STUDENTS =================

      if (students.length === 0) {

        alert("Load Students First");

        return;
      }



      // ================= WARNING =================

      if (alreadyUpdated) {

        const confirmUpdate =
        confirm(
          "Attendance already uploaded today. Update changes?"
        );

        if (!confirmUpdate) {

          return;
        }

      }



      status.innerText =
      "Uploading Attendance...";



      // ================= LOOP =================

      for (const student of students) {

        const checked =
        document.getElementById(student.email).checked;

        const ref =
        doc(
          db,
          "student_attendance",
          student.email
        );

        const snap =
        await getDoc(ref);



        // ================= OLD =================

        let old = {};

        if (snap.exists()) {

          old = snap.data();

        }



        // ================= VALUES =================

        let totalHomework =
        old.totalHomework || 0;

        let homeworkPresent =
        old.homeworkPresent || 0;

        let totalForenoon =
        old.totalForenoon || 0;

        let forenoonPresent =
        old.forenoonPresent || 0;

        let totalAfternoon =
        old.totalAfternoon || 0;

        let afternoonPresent =
        old.afternoonPresent || 0;



        // ================= HOMEWORK =================

        if (type === "homework") {

          // SAME DAY UPDATE
          if (
            old.lastHomeworkDate === today
          ) {

            // OLD PRESENT
            if (
              old.todayHomework === true &&
              !checked
            ) {

              homeworkPresent--;

            }

            // OLD ABSENT
            if (
              old.todayHomework === false &&
              checked
            ) {

              homeworkPresent++;

            }

          }

          // NEW DAY
          else {

            totalHomework++;

            if (checked) {

              homeworkPresent++;

            }

          }

        }



        // ================= FORENOON =================

        if (type === "forenoon") {

          // SAME DAY UPDATE
          if (
            old.lastForenoonDate === today
          ) {

            // OLD PRESENT
            if (
              old.todayForenoon === true &&
              !checked
            ) {

              forenoonPresent--;

            }

            // OLD ABSENT
            if (
              old.todayForenoon === false &&
              checked
            ) {

              forenoonPresent++;

            }

          }

          // NEW DAY
          else {

            totalForenoon++;

            if (checked) {

              forenoonPresent++;

            }

          }

        }



        // ================= AFTERNOON =================

        if (type === "afternoon") {

          // SAME DAY UPDATE
          if (
            old.lastAfternoonDate === today
          ) {

            // OLD PRESENT
            if (
              old.todayAfternoon === true &&
              !checked
            ) {

              afternoonPresent--;

            }

            // OLD ABSENT
            if (
              old.todayAfternoon === false &&
              checked
            ) {

              afternoonPresent++;

            }

          }

          // NEW DAY
          else {

            totalAfternoon++;

            if (checked) {

              afternoonPresent++;

            }

          }

        }



        // ================= SAVE =================

        await setDoc(ref, {

          email:
          student.email,

          name:
          student.name || "",

          class:
          student.class || "",



          totalHomework,
          homeworkPresent,



          totalForenoon,
          forenoonPresent,



          totalAfternoon,
          afternoonPresent,



          todayHomework:
          type === "homework"
          ? checked
          : (
            old.todayHomework || false
          ),



          todayForenoon:
          type === "forenoon"
          ? checked
          : (
            old.todayForenoon || false
          ),



          todayAfternoon:
          type === "afternoon"
          ? checked
          : (
            old.todayAfternoon || false
          ),



          lastHomeworkDate:
          type === "homework"
          ? today
          : (
            old.lastHomeworkDate || ""
          ),



          lastForenoonDate:
          type === "forenoon"
          ? today
          : (
            old.lastForenoonDate || ""
          ),



          lastAfternoonDate:
          type === "afternoon"
          ? today
          : (
            old.lastAfternoonDate || ""
          )

        });

      }



      status.innerText =
      "✅ Attendance Uploaded Successfully";

    };



    // ================= BACK =================

    window.goBack = function () {

      window.location.href =
      "admin.html";

    };

  </script>

</body>
</html>
