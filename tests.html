<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tests</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: linear-gradient(180deg, #020617, #0f172a);
    }
  </style>
</head>

<body class="text-white min-h-screen px-4 py-6">

  <!-- HEADER -->
  <div class="flex justify-between items-center mb-5">
    <h1 class="text-2xl font-bold">📝 Tests</h1>
    <button onclick="goBack()" class="bg-white/10 px-3 py-1 rounded-lg text-sm">Back</button>
  </div>

  <!-- LIST -->
  <div id="testList" class="space-y-4"></div>

  <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  collection,
  getDocs,
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyADk8OyaN6-8sbzuq3s0TTbe9cO1ryv4PA",
  authDomain: "ikvm-226e7.firebaseapp.com",
  projectId: "ikvm-226e7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let studentClass = "";
let userEmail = "";

// 🔥 AUTH
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "index.html";
    return;
  }

  userEmail = user.email;

  const userDoc = await getDoc(doc(db, "users", userEmail));
  studentClass = userDoc.data().class;

  loadTests();
});

// 🔥 LOAD TESTS
async function loadTests() {
  const container = document.getElementById("testList");
  container.innerHTML = "Loading...";

  const snapshot = await getDocs(collection(db, "tests"));

  let tests = [];

  snapshot.forEach(d => {
    const data = d.data();

    if (data.class === studentClass) {
      tests.push({ id: d.id, ...data });
    }
  });

  displayTests(tests);
}

// 🔥 DISPLAY TESTS
async function displayTests(tests) {
  const container = document.getElementById("testList");

  if (tests.length === 0) {
    container.innerHTML = "<p>No tests found</p>";
    return;
  }

  container.innerHTML = "";

  const now = Date.now();

  for (const test of tests) {

    let status = "";
    let action = "";

    // 🔥 CHECK RESULT EXISTS (MAIN LOGIC)
    const resultRef = doc(db, "results", test.id, "students", userEmail);
    const resultSnap = await getDoc(resultRef);

    if (resultSnap.exists()) {
      status = "✅ Attempted";

      action = `
        <button onclick="viewResult('${test.id}')" 
          class="mt-3 bg-blue-600 px-3 py-2 rounded-lg">
          View Result
        </button>
      `;
    }

    // 🔥 ONLINE TEST
    else if (test.mode === "online") {

      const start = test.startTime;
      const end = test.endTime;

      if (now < start) {
        status = "⏳ Not Started";
      }

      else if (now >= start && now <= end) {
        status = "🟢 Live";

        action = `
          <button onclick="startTest('${test.id}')" 
            class="mt-3 bg-green-600 px-3 py-2 rounded-lg">
            Start Test
          </button>
        `;
      }

      else {
        status = "❌ Ended";
      }
    }

    // 🔥 OFFLINE TEST
    else {
      status = "📝 Offline Test";

      if (test.resultsPublished) {
        action = `
          <button onclick="viewResult('${test.id}')" 
            class="mt-3 bg-blue-600 px-3 py-2 rounded-lg">
            View Result
          </button>
        `;
      } else {
        action = `<p class="text-gray-400 mt-2">Result not published</p>`;
      }
    }

    const date = new Date(test.date).toLocaleDateString();

    container.innerHTML += `
      <div class="bg-white/5 border border-white/10 rounded-2xl p-5">

        <h2 class="text-lg font-semibold">${test.testName}</h2>

        <p class="text-gray-400 text-sm">${test.subject}</p>

        <p class="text-xs text-gray-500">${date}</p>

        <p class="mt-2">${status}</p>

        ${action}

      </div>
    `;
  }
}

// 🔥 NAVIGATION
window.startTest = (id) => {
  window.location.href = `test.html?id=${id}`;
};

window.viewResult = (id) => {
  window.location.href = `result.html?id=${id}`;
};
</script>

</body>
</html>
