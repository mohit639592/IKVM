<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Attendance Analytics</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#0f172a;
      color:white;
      padding:20px;
    }

    .title{
      text-align:center;
      font-size:30px;
      font-weight:bold;
      margin-bottom:25px;
      color:#38bdf8;
    }

    .top{
      display:flex;
      gap:10px;
      margin-bottom:20px;
    }

    select,
    input{
      flex:1;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#1e293b;
      color:white;
      outline:none;
    }

    .card{
      background:#1e293b;
      padding:18px;
      border-radius:16px;
      margin-bottom:15px;
    }

    .name{
      font-size:22px;
      font-weight:bold;
      margin-bottom:8px;
    }

    .class{
      color:#94a3b8;
      margin-bottom:15px;
      font-size:14px;
    }

    .section{
      margin-top:18px;
    }

    .section-title{
      margin-bottom:10px;
      color:#38bdf8;
      font-weight:bold;
      font-size:16px;
    }

    .stats{
      display:flex;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }

    .box{
      flex:1;
      background:#0f172a;
      padding:14px;
      border-radius:12px;
      text-align:center;
    }

    .box-title{
      font-size:13px;
      color:#94a3b8;
      margin-bottom:6px;
    }

    .box-value{
      font-size:20px;
      font-weight:bold;
    }

    .bar{
      width:100%;
      height:14px;
      background:#334155;
      border-radius:20px;
      overflow:hidden;
      margin-top:8px;
    }

    .fill{
      height:100%;
      border-radius:20px;
    }

    .green{
      background:#22c55e;
    }

    .yellow{
      background:#eab308;
    }

    .red{
      background:#ef4444;
    }

    .percent{
      margin-top:8px;
      text-align:center;
      font-size:16px;
      font-weight:bold;
      color:#38bdf8;
    }

    .overall{
      margin-top:20px;
      padding:14px;
      border-radius:12px;
      background:#0f172a;
      text-align:center;
      font-size:20px;
      font-weight:bold;
      color:#38bdf8;
    }

    .loading{
      text-align:center;
      margin-top:50px;
      font-size:18px;
      color:#38bdf8;
    }

  </style>

</head>

<body>

  <div class="title">
    Attendance Analytics
  </div>

  <div class="top">

    <select
      id="classFilter"
      onchange="loadAnalytics()"
    >

      <option value="">
        Select Class
      </option>

      <option value="6">Class 6</option>
      <option value="7">Class 7</option>
      <option value="8">Class 8</option>
      <option value="9">Class 9</option>
      <option value="10">Class 10</option>
      <option value="11">Class 11</option>
      <option value="12">Class 12</option>

    </select>

    <input
      type="text"
      id="search"
      placeholder="Search Student"
      onkeyup="loadAnalytics()"
    >

  </div>

  <div
    id="loading"
    class="loading"
  >
    Select Class
  </div>

  <div id="students"></div>

<script>

  const firebaseConfig = {

      apiKey: "AIzaSyADk8OyaN6-8sbzuq3s0TTbe9cO1ryv4PA",
  authDomain: "ikvm-226e7.firebaseapp.com",
  projectId: "ikvm-226e7",
  storageBucket: "ikvm-226e7.firebasestorage.app",
  messagingSenderId: "760869116173",
  appId: "1:760869116173:web:ef05c859b6f116d2673844",
  measurementId: "G-THYLG7RFGW"

  };

  firebase.initializeApp(firebaseConfig);

  const db = firebase.firestore();

  async function loadAnalytics(){

    const selectedClass =
      document.getElementById(
        "classFilter"
      ).value;

    const search =
      document.getElementById(
        "search"
      )
      .value
      .toLowerCase();

    const studentsDiv =
      document.getElementById(
        "students"
      );

    const loading =
      document.getElementById(
        "loading"
      );

    studentsDiv.innerHTML = "";

    if(!selectedClass){

      loading.style.display = "block";

      loading.innerText =
        "Select Class";

      return;

    }

    loading.style.display = "block";

    loading.innerText =
      "Loading Analytics...";

    // FETCH BOTH COLLECTIONS

    const attendanceSnapshot =
      await db
      .collection("student_attendance")
      .where(
        "class",
        "==",
        selectedClass
      )
      .get();

    const homeworkSnapshot =
      await db
      .collection("homework_attendance")
      .where(
        "class",
        "==",
        selectedClass
      )
      .get();

    loading.style.display = "none";

    let studentsMap = {};

    // NORMAL ATTENDANCE

    attendanceSnapshot.forEach(doc => {

      const data = doc.data();

      studentsMap[doc.id] = {

        ...data,

        homeworkDone: 0,
        homeworkHeld: 0

      };

    });

    // HOMEWORK ATTENDANCE

    homeworkSnapshot.forEach(doc => {

      const data = doc.data();

      if(!studentsMap[doc.id]){

        studentsMap[doc.id] = {
          name: data.name,
          class: data.class
        };

      }

      studentsMap[doc.id].homeworkDone =
        data.totalDone || 0;

      studentsMap[doc.id].homeworkHeld =
        data.totalHeld || 0;

    });

    const students =
      Object.values(studentsMap);

    if(students.length === 0){

      studentsDiv.innerHTML = `

        <div class="loading">
          No Attendance Data
        </div>

      `;

      return;

    }

    let found = false;

    students.forEach(data => {

      const name =
        (data.name || "")
        .toLowerCase();

      if(
        !name.includes(search)
      ){
        return;
      }

      found = true;

      // FN

      const fnPercent =
        calculate(
          data.forenoonPresent,
          data.totalForenoon
        );

      // AN

      const anPercent =
        calculate(
          data.afternoonPresent,
          data.totalAfternoon
        );

      // HW

      const hwPercent =
        calculate(
          data.homeworkDone,
          data.homeworkHeld
        );

      // OVERALL

      let total = 0;
      let count = 0;

      if(data.totalForenoon > 0){

        total += fnPercent;
        count++;

      }

      if(data.totalAfternoon > 0){

        total += anPercent;
        count++;

      }

      if(data.homeworkHeld > 0){

        total += hwPercent;
        count++;

      }

      const overall =
        count > 0
        ? Math.round(total / count)
        : 0;

      studentsDiv.innerHTML += `

        <div class="card">

          <div class="name">
            ${data.name || "N/A"}
          </div>

          <div class="class">
            Class ${data.class || "N/A"}
          </div>

          ${
            data.totalForenoon > 0
            ? sectionHTML(
                "Forenoon Attendance",
                data.forenoonPresent,
                data.totalForenoon,
                fnPercent
              )
            : ""
          }

          ${
            data.totalAfternoon > 0
            ? sectionHTML(
                "Afternoon Attendance",
                data.afternoonPresent,
                data.totalAfternoon,
                anPercent
              )
            : ""
          }

          ${
            data.homeworkHeld > 0
            ? sectionHTML(
                "Homework Completion",
                data.homeworkDone,
                data.homeworkHeld,
                hwPercent
              )
            : ""
          }

          <div class="overall">
            Overall : ${overall}%
          </div>

        </div>

      `;

    });

    if(!found){

      studentsDiv.innerHTML = `

        <div class="loading">
          No Student Found
        </div>

      `;

    }

  }

  function calculate(
    present,
    total
  ){

    if(
      !total ||
      total <= 0
    ){
      return 0;
    }

    return Math.round(
      (present / total) * 100
    );

  }

  function sectionHTML(
    title,
    present,
    total,
    percent
  ){

    let color = "green";

    if(percent < 75){

      color = "red";

    }
    else if(percent < 90){

      color = "yellow";

    }

    return `

      <div class="section">

        <div class="section-title">
          ${title}
        </div>

        <div class="stats">

          <div class="box">

            <div class="box-title">
              Present / Done
            </div>

            <div class="box-value">
              ${present || 0}
            </div>

          </div>

          <div class="box">

            <div class="box-title">
              Total
            </div>

            <div class="box-value">
              ${total || 0}
            </div>

          </div>

        </div>

        <div class="bar">

          <div
            class="fill ${color}"
            style="width:${percent}%"
          ></div>

        </div>

        <div class="percent">
          ${percent}%
        </div>

      </div>

    `;

  }

</script>

</body>
</html>
