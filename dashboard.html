<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IKVM Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: radial-gradient(circle at top, #0f172a, #020617);
    }
  </style>
</head>

<body class="text-white min-h-screen px-4 py-6">

  <!-- 🔥 HEADER -->
  <div class="flex justify-between items-center mb-6">
    <div>
      <h1 id="greeting" class="text-2xl font-bold">Hello 👋</h1>
      <p id="userEmail" class="text-gray-400 text-sm"></p>
    </div>

    <button onclick="logout()" class="bg-white/10 px-3 py-1 rounded-lg text-sm">
      Logout
    </button>
  </div>

  <!-- 🔥 HERO CARD -->
  <div class="bg-gradient-to-br from-purple-600/20 to-pink-600/20 border border-white/10 rounded-3xl p-6 mb-6 backdrop-blur-xl">
    <h2 class="text-xl font-semibold mb-2">Welcome to IKVM 🚀</h2>
    <p class="text-gray-300 text-sm">
      Access homework, tests, and performance all in one place.
    </p>
  </div>

  <!-- 🔥 MAIN ACTION CARDS -->
  <div class="grid gap-5">

    <!-- Homework -->
    <div onclick="goHomework()" class="bg-white/5 border border-white/10 rounded-2xl p-5 backdrop-blur-xl active:scale-95 transition flex justify-between items-center">
      <div>
        <h2 class="text-lg font-semibold">📚 Homework</h2>
        <p class="text-gray-400 text-sm">View all assignments</p>
      </div>
      <div class="text-2xl">→</div>
    </div>

    <!-- Tests -->
    <div onclick="goTests()" class="bg-white/5 border border-white/10 rounded-2xl p-5 backdrop-blur-xl active:scale-95 transition flex justify-between items-center">
      <div>
        <h2 class="text-lg font-semibold">📝 Tests</h2>
        <p class="text-gray-400 text-sm">Check upcoming tests</p>
      </div>
      <div class="text-2xl">→</div>
    </div>

    <!-- Performance -->
    <div onclick="goPerformance()" class="bg-white/5 border border-white/10 rounded-2xl p-5 backdrop-blur-xl active:scale-95 transition flex justify-between items-center">
      <div>
        <h2 class="text-lg font-semibold">📊 Performance</h2>
        <p class="text-gray-400 text-sm">Track your progress</p>
      </div>
      <div class="text-2xl">→</div>
    </div>

  </div>

  <!-- 🔥 FIREBASE + LOGIC -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { 
      getAuth, 
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyADk8OyaN6-8sbzuq3s0TTbe9cO1ryv4PA",
      authDomain: "ikvm-226e7.firebaseapp.com",
      projectId: "ikvm-226e7"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // 🔥 USER + GREETING
    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "index.html";
        return;
      }

      document.getElementById("userEmail").innerText = user.email;

      const name = user.email.split("@")[0];

      const hour = new Date().getHours();
      let greeting = "Hello";

      if (hour < 12) greeting = "Good Morning";
      else if (hour < 18) greeting = "Good Afternoon";
      else greeting = "Good Evening";

      document.getElementById("greeting").innerText = `${greeting}, ${name} 👋`;
    });

    // 🔥 NAVIGATION
    window.goHomework = () => window.location.href = "homework.html";
    window.goTests = () => window.location.href = "tests.html";
    window.goPerformance = () => window.location.href = "performance.html";

    // 🔥 LOGOUT
    window.logout = function () {
      signOut(auth).then(() => {
        window.location.href = "index.html";
      });
    };
  </script>

</body>
</html>
